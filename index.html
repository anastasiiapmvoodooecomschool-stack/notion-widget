<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Найближча подія</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    background: #1e1e2e;
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #7c7f9e;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4f8ef7;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .event-title {
    font-size: 18px;
    font-weight: 700;
    color: #e8e8f0;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .event-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #9394b0;
  }

  .meta-row svg { flex-shrink: 0; opacity: 0.7; }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin: 16px 0;
  }

  .countdown {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .countdown-label { font-size: 12px; color: #7c7f9e; }

  .countdown-value {
    font-size: 13px;
    font-weight: 600;
    color: #4f8ef7;
    background: rgba(79, 142, 247, 0.12);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .join-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    background: #4f8ef7;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.2s;
  }

  .join-btn:hover { background: #3a7de8; }

  .loading, .no-events {
    color: #7c7f9e;
    font-size: 14px;
    text-align: center;
    padding: 10px 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">
    <span class="dot"></span>Найближча подія
  </div>
  <div id="content" class="loading">Завантаження...</div>
  <div id="bottom-block" style="display:none">
    <hr class="divider">
    <div class="countdown">
      <span class="countdown-label">До події</span>
      <span class="countdown-value" id="countdown">—</span>
    </div>
    <div id="join-block"></div>
  </div>
</div>

<script>
  const API_KEY = 'AIzaSyDpvMXIh6ZpeCRHxdH6NAZAD4MH5hHHQrk';
  const CALENDAR_ID = 'c_8f93cfbe74415ddb08b0ae24d2fef57bb3eaab7141382498f44602146805dacd@group.calendar.google.com';

  let eventStart = null;

  const DAYS_UK = ['Неділя','Понеділок','Вівторок','Середа','Четвер',"П'ятниця",'Субота'];
  const MONTHS_UK = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

  function formatDate(d) {
    const dt = new Date(d);
    return `${DAYS_UK[dt.getDay()]}, ${dt.getDate()} ${MONTHS_UK[dt.getMonth()]} ${dt.getFullYear()}`;
  }

  function formatTime(s, e) {
    const pad = n => String(n).padStart(2,'0');
    const sd = new Date(s), ed = new Date(e);
    return `${pad(sd.getHours())}:${pad(sd.getMinutes())} – ${pad(ed.getHours())}:${pad(ed.getMinutes())}`;
  }

  function updateCountdown() {
    if (!eventStart) return;
    const diff = eventStart - new Date();
    const el = document.getElementById('countdown');
    if (diff <= 0) { el.textContent = 'Зараз!'; return; }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    if (days > 0) el.textContent = `${days} дн. ${hours} год.`;
    else if (hours > 0) el.textContent = `${hours} год. ${mins} хв.`;
    else el.textContent = `${mins} хв.`;
  }

  async function fetchEvent() {
    const now = new Date().toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now}&maxResults=1&singleEvents=true&orderBy=startTime`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!data.items || data.items.length === 0) {
        document.getElementById('content').innerHTML = '<div class="no-events">Найближчих подій немає</div>';
        return;
      }

      const ev = data.items[0];
      const startRaw = ev.start.dateTime || ev.start.date;
      const endRaw = ev.end.dateTime || ev.end.date;
      eventStart = new Date(startRaw);
      const isAllDay = !ev.start.dateTime;

      const meetLink = ev.hangoutLink
        || ev.conferenceData?.entryPoints?.find(e => e.entryPointType === 'video')?.uri
        || null;

      document.getElementById('content').innerHTML = `
        <div class="event-title">${ev.summary}</div>
        <div class="event-meta">
          <div class="meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>${formatDate(startRaw)}</span>
          </div>
          ${!isAllDay ? `
          <div class="meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>${formatTime(startRaw, endRaw)}</span>
          </div>` : ''}
        </div>
      `;

      document.getElementById('bottom-block').style.display = 'block';

      if (meetLink) {
        document.getElementById('join-block').innerHTML = `
          <a href="${meetLink}" target="_blank" class="join-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
            Приєднатись до зустрічі
          </a>
        `;
      }

      updateCountdown();
      setInterval(updateCountdown, 30000);

    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="no-events">Помилка завантаження</div>';
    }
  }

  fetchEvent();
</script>
</body>
</html>
