<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Найближча подія</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
  }

  .card {
    background: #1e1e2e;
    border-radius: 16px;
    padding: 20px 24px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #7c7f9e;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4f8ef7;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  a.event-title {
    display: block;
    font-size: 18px;
    font-weight: 700;
    color: #e8e8f0;
    line-height: 1.3;
    margin-bottom: 12px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  a.event-title:hover { opacity: 0.75; }

  .event-meta { display: flex; flex-direction: column; gap: 6px; }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #9394b0;
  }

  .meta-row svg { flex-shrink: 0; opacity: 0.7; }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin: 16px 0;
  }

  .countdown {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .countdown-label { font-size: 12px; color: #7c7f9e; }

  .countdown-value {
    font-size: 13px;
    font-weight: 600;
    color: #4f8ef7;
    background: rgba(79,142,247,0.12);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }

  .join-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex: 1;
    padding: 10px;
    background: #4f8ef7;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .join-btn:hover { background: #3a7de8; }

  .add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(79,142,247,0.12);
    color: #4f8ef7;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: rgba(79,142,247,0.22); }

  /* Якщо немає кнопки зустрічі — кнопка додавання на всю ширину */
  .btn-row.only-add .add-btn {
    flex: 1;
  }

  .loading, .no-events {
    color: #7c7f9e;
    font-size: 14px;
    text-align: center;
    padding: 10px 0;
  }

  /* Світла тема */
  @media (prefers-color-scheme: light) {
    html, body { background: #f7f6f3; }
    .card { background: #ffffff; border-color: rgba(0,0,0,0.08); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .label { color: #9b9aaa; }
    .dot { background: #2383e2; }
    a.event-title { color: #1a1a1a; }
    .meta-row { color: #6b7280; }
    .divider { border-color: rgba(0,0,0,0.08); }
    .countdown-label { color: #9b9aaa; }
    .countdown-value { color: #2383e2; background: rgba(35,131,226,0.1); }
    .join-btn { background: #2383e2; }
    .join-btn:hover { background: #1a6fc4; }
    .add-btn { background: rgba(35,131,226,0.1); color: #2383e2; }
    .add-btn:hover { background: rgba(35,131,226,0.2); }
    .loading, .no-events { color: #9b9aaa; }
  }

  /* Темна тема */
  @media (prefers-color-scheme: dark) {
    html, body { background: #191919; }
    .card { background: #1e1e2e; border-color: rgba(255,255,255,0.08); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">
    <span class="dot"></span>Найближча подія
  </div>
  <div id="content" class="loading">Завантаження...</div>
  <div id="bottom-block" style="display:none">
    <hr class="divider">
    <div class="countdown">
      <span class="countdown-label">До події</span>
      <span class="countdown-value" id="countdown">—</span>
    </div>
    <div id="join-block"></div>
  </div>
</div>

<script>
  const API_KEY = 'AIzaSyDpvMXIh6ZpeCRHxdH6NAZAD4MH5hHHQrk';
  const CALENDAR_ID = 'c_8f93cfbe74415ddb08b0ae24d2fef57bb3eaab7141382498f44602146805dacd@group.calendar.google.com';

  let eventStart = null;

  const DAYS_UK = ['Неділя','Понеділок','Вівторок','Середа','Четвер',"П'ятниця",'Субота'];
  const MONTHS_UK = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];

  function formatDate(d) {
    const dt = new Date(d);
    return `${DAYS_UK[dt.getDay()]}, ${dt.getDate()} ${MONTHS_UK[dt.getMonth()]} ${dt.getFullYear()}`;
  }

  function formatTime(s, e) {
    const pad = n => String(n).padStart(2,'0');
    const sd = new Date(s), ed = new Date(e);
    return `${pad(sd.getHours())}:${pad(sd.getMinutes())} – ${pad(ed.getHours())}:${pad(ed.getMinutes())}`;
  }

  function toGCalDate(iso) {
    return new Date(iso).toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
  }

  function buildAddToCalLink(ev, startRaw, endRaw, meetLink) {
    const meetLine = meetLink ? ('Посилання на зустріч: ' + meetLink + '\n\n') : '';
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: ev.summary || '',
      dates: `${toGCalDate(startRaw)}/${toGCalDate(endRaw)}`,
      details: meetLine + (ev.description || ''),
      location: meetLink || ev.location || ''
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  }

  function updateCountdown() {
    if (!eventStart) return;
    const diff = eventStart - new Date();
    const el = document.getElementById('countdown');
    if (diff <= 0) { el.textContent = 'Зараз!'; return; }
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    if (days > 0) el.textContent = `${days} дн. ${hours} год.`;
    else if (hours > 0) el.textContent = `${hours} год. ${mins} хв.`;
    else el.textContent = `${mins} хв.`;
  }

  async function fetchEvent() {
    const now = new Date().toISOString();
    const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now}&maxResults=1&singleEvents=true&orderBy=startTime`;

    try {
      const res = await fetch(url);
      const data = await res.json();

      if (!data.items || data.items.length === 0) {
        document.getElementById('content').innerHTML = '<div class="no-events">Найближчих подій немає</div>';
        return;
      }

      const ev = data.items[0];
      const startRaw = ev.start.dateTime || ev.start.date;
      const endRaw = ev.end.dateTime || ev.end.date;
      eventStart = new Date(startRaw);
      const isAllDay = !ev.start.dateTime;

      const meetLink = ev.hangoutLink
        || ev.conferenceData?.entryPoints?.find(e => e.entryPointType === 'video')?.uri
        || null;

      const addLink = buildAddToCalLink(ev, startRaw, endRaw, meetLink);

      document.getElementById('content').innerHTML = `
        <a href="${ev.htmlLink}" target="_blank" class="event-title">${ev.summary}</a>
        <div class="event-meta">
          <div class="meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>${formatDate(startRaw)}</span>
          </div>
          ${!isAllDay ? `
          <div class="meta-row">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>${formatTime(startRaw, endRaw)}</span>
          </div>` : ''}
        </div>
      `;

      document.getElementById('bottom-block').style.display = 'block';

      const addBtn = `
        <a href="${addLink}" target="_blank" class="add-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
            <line x1="12" y1="15" x2="12" y2="19"/>
            <line x1="10" y1="17" x2="14" y2="17"/>
          </svg>
          Додати
        </a>
      `;

      if (meetLink) {
        document.getElementById('join-block').innerHTML = `
          <div class="btn-row">
            <a href="${meetLink}" target="_blank" class="join-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2"/>
              </svg>
              Приєднатись до зустрічі
            </a>
            ${addBtn}
          </div>
        `;
      } else {
        document.getElementById('join-block').innerHTML = `
          <div class="btn-row only-add">${addBtn}</div>
        `;
      }

      updateCountdown();
      setInterval(updateCountdown, 30000);

    } catch (e) {
      document.getElementById('content').innerHTML = '<div class="no-events">Помилка завантаження</div>';
    }
  }

  fetchEvent();
</script>
</body>
</html>
